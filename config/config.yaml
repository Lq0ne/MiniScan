mini_scan:
  # Absolute path to WeChat mini program cache base directory (wx_dir)
  wx_dir: "C:\\Users\\Lq0ne\\AppData\\Roaming\\Tencent\\xwechat\\radium\\Applet\\packages"

  # Output directory for decompiled mini program sources；It should be same as the result_dir in fortify_scan section
  output_dir: "./Output/Source"

  # Enable async HTTP fuzzing for discovered URLs
  asyncio_http_enabled: false

  # Output Excel file name for Mini-Scan URL/secret results (stored under each result directory)
  process_file: "Key.xlsx"

  # Domains to exclude from async HTTP fuzzing
  not_asyncio_http:
    - "weixin.qq.com"
    - "www.w3.org"
    - "map.qq.com"
    - "restapi.amap.com"

  # HTTP status codes to ignore when collecting async HTTP results
  not_asyncio_status:
    - 404

  # Max worker threads for Mini-Scan URL/secret extraction
  max_workers: 5

  # Timeout (seconds) for external WeChat unpack command
  wx_cmd_timeout: 1000

  # Path to KillWxapkg.exe tool (relative to tools directory)
  unpack_tool: ".\\tools\\KillWxapkg.exe"

  # Default pretty formatting toggle for decompiled code (currently enforced by CLI)
  pretty_default: true

  # Bot / notification configuration (reserved for future use)
  bot_enabled: false
  bot_api_id: ""
  bot_api_secret: ""
  bot_phone:
    - ""

fortify_scan:
  # Enable or disable Fortify scanning globally
  enabled: true

  # Fortify installation path
  fortify_path: "C:\\Program Files\\Fortify\\OpenText_SAST_Fortify_25.3.0"

  # ReportGenerator.bat path
  report_generator_path: "C:\\Program Files\\Fortify\\OpenText_Application_Security_Tools_25.2.0\\bin\\ReportGenerator.bat"

  # Fortify scan output directory for FPR/PDF (under Output/Audit)
  output_dir: "./Output/Audit"

  # Max workers for parallel Fortify scans
  max_workers: 1

